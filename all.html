    // Scalebar — reattached on every page change in sequence mode
    function addScalebar() {
      viewer.scalebar({
        type: OpenSeadragon.ScalebarType.MICROSCOPY,
        pixelsPerMeter: 1.98255e+06,
        minWidth: '120px',
        location: OpenSeadragon.ScalebarLocation.BOTTOM_RIGHT,
        color: 'black',
        fontColor: 'black',
        backgroundColor: 'rgba(255,255,255,0.65)',
        barThickness: 3,
        fontSize: '12px',
        xOffset: 14,
        yOffset: 14
      });
    }
    viewer.addHandler('open', addScalebar);

    // Add a keydown event listener to the document
    document.addEventListener("keydown", function (event) {
      // Check if the pressed key is 'Z' (key code 90) to zoom in
      if (event.keyCode === 90) {
        // Zoom in
        viewer.viewport.zoomBy(1.2);
      }
      // Check if the pressed key is 'X' (key code 88) to zoom out
      else if (event.keyCode === 88) {
        // Zoom out
        viewer.viewport.zoomBy(0.8);
      }
    });
